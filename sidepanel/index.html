<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Selecta — Side Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="panel-container">
    <!-- Header with Logo and Navigation Tabs -->
    <header class="panel-header">
      <div class="logo-container">
        <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <span class="logo-text">Selecta</span>
      </div>
      
      <div class="tab-pill-selector">
        <button class="tab-btn active" id="tab-history" title="Lookup History">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5v-15z"></path></svg>
          <span>History</span>
        </button>
        <button class="tab-btn" id="tab-settings" title="Extension Settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          <span>Settings</span>
        </button>
      </div>
    </header>

    <!-- Main Content Workspace Viewport -->
    <main class="viewport">
      
      <!-- Panel 1: History Panel -->
      <section class="tab-pane" id="pane-history">
        <!-- Service Active Status Toggle Row -->
        <div class="status-row">
          <span class="status-label">Selecta Active</span>
          <label class="switch">
            <input type="checkbox" id="toggle-service" checked>
            <span class="slider"></span>
          </label>
        </div>

        <!-- Search History input -->
        <div class="search-container">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" class="search-input" id="history-search" placeholder="Search lookups or results...">
        </div>

        <!-- History cards scroll view -->
        <div class="history-list" id="history-list">
          <!-- Empty State Template -->
          <div class="history-empty" id="history-empty">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            <span>No explanation history yet.<br>Select any text on a web page to begin.</span>
          </div>
        </div>
      </section>

      <!-- Panel 2: Settings Panel -->
      <section class="tab-pane hidden" id="pane-settings">
        <div class="settings-section">
          
          <!-- API Key Section -->
          <div class="settings-group">
            <label class="settings-label" for="input-api-key">DeepSeek API Key</label>
            <div class="input-with-action">
              <input type="password" class="text-input" id="input-api-key" placeholder="Enter deepseek-chat API Key">
              <button class="icon-action-btn" id="toggle-key-visibility" title="Show/Hide Key">
                <svg id="visibility-eye" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </button>
            </div>
            <div class="button-row">
              <button class="btn" id="btn-save-key">
                <svg id="btn-save-spinner" class="spin hidden" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
                <span id="btn-save-text">Test & Save</span>
              </button>
            </div>
            <div class="validation-msg" id="key-status-msg"></div>
          </div>

          <div class="divider"></div>

          <!-- Explanation Mode Selection -->
          <div class="settings-group">
            <label class="settings-label" for="select-mode">Explanation Mode</label>
            <select class="select-input" id="select-mode">
              <option value="auto">Auto (Switch based on word count)</option>
              <option value="dictionary">Dictionary Only</option>
              <option value="summarize">Summarize Only</option>
            </select>
          </div>

          <!-- Word Limit Slider (Conditional) -->
          <div class="settings-group" id="group-slider">
            <div class="label-row">
              <label class="settings-label" for="input-slider">Word Count Threshold</label>
              <span class="value-display" id="slider-value-display">30 words</span>
            </div>
            <input type="range" class="slider-input" id="input-slider" min="5" max="200" value="30">
            <span class="slider-description" id="slider-description">Dictionary if selection <= 30 words, Summarize if larger.</span>
          </div>

          <div class="divider"></div>

          <!-- Blocklist Settings -->
          <div class="settings-group">
            <label class="settings-label" for="input-blocklist">Site Blocklist</label>
            <span class="input-description">Extension will not fire on these domains (one per line)</span>
            <textarea class="textarea-input" id="input-blocklist" placeholder="e.g.&#10;gmail.com&#10;docs.google.com" spellcheck="false"></textarea>
          </div>

          <!-- Interface Theme Selector -->
          <div class="settings-group">
            <label class="settings-label" for="select-theme">Interface Theme</label>
            <select class="select-input" id="select-theme">
              <option value="system">Follow System Preferences</option>
              <option value="light">Light Sand</option>
              <option value="dark">Deep Navy</option>
            </select>
          </div>

          <div class="divider"></div>

          <!-- Clear History Control -->
          <div class="settings-group danger-zone">
            <label class="settings-label">Danger Zone</label>
            <button class="btn btn-danger" id="btn-clear-history">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
              <span>Clear All History</span>
            </button>
          </div>

        </div>
      </section>
      
    </main>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
